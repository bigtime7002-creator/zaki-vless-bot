name: Zaki Cloud Run Bot
on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Project ID'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v1'
        with:
          # هذا السطر سيربط المفتاح الذي وضعته في الإعدادات
          token_format: 'access_token'
          refresh_token: ${{ secrets.GCP_TOKEN }}
          client_id: ${{ vars.GCP_CLIENT_ID || '407408718192.apps.googleusercontent.com' }}
          client_secret: ${{ vars.GCP_CLIENT_SECRET || 'd9Q0vAL2A6pSp6qE8sPSBv9p' }}

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v1'

      - name: 'Deploy to Cloud Run'
        run: |
          gcloud config set project ${{ github.event.inputs.project_id }}
          gcloud run deploy zaki-server \
            --source . \
            --region europe-west1 \
            --allow-unauthenticated \
            --port 8080 --quiet
          
          echo "الرابط النهائي للسيرفر هو:"
          gcloud run services describe zaki-server --region europe-west1 --format='value(status.url)'
