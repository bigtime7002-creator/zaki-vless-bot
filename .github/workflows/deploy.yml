name: Zaki Cloud Run Bot
on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Project ID'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v1'

      - name: 'Direct Authentication & Deploy'
        run: |
          # هذه هي الطريقة المختصرة والقوية
          gcloud auth activate-refresh-token ${{ secrets.GCP_TOKEN }} --client-id="407408718192.apps.googleusercontent.com" --client-secret="d9Q0vAL2A6pSp6qE8sPSBv9p"
          
          # ضبط المشروع
          gcloud config set project ${{ github.event.inputs.project_id }}
          
          # النشر
          gcloud run deploy zaki-server \
            --source . \
            --region europe-west1 \
            --allow-unauthenticated \
            --port 8080 --quiet
          
          echo "تم بنجاح! الرابط هو:"
          gcloud run services describe zaki-server --region europe-west1 --format='value(status.url)'
