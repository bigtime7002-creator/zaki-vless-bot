name: Zaki Direct Deploy
on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'رقم المختبر'
        required: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    # الخدعة هنا: تعريف المتغير بشكل صريح لكل الخطوات
    env:
      MY_GCP_TOKEN: ${{ secrets.GCP_TOKEN }}
    
    steps:
      - uses: actions/checkout@v3
      - uses: google-github-actions/setup-gcloud@v1

      - name: 'Login and Deploy'
        run: |
          # نستخدم المتغير الذي عرفناه فوق مباشرة
          gcloud auth activate-refresh-token $MY_GCP_TOKEN --client-id="407408718192.apps.googleusercontent.com" --client-secret="d9Q0vAL2A6pSp6qE8sPSBv9p"
          
          gcloud config set project ${{ github.event.inputs.project_id }}
          
          gcloud run deploy zaki-server --source . --region europe-west1 --allow-unauthenticated --port 8080 --quiet
